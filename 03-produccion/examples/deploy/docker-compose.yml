# Nivel B del plan: el stack completo levantado en tu máquina, sin cuentas
# cloud. app (FastAPI) + db (Postgres+pgvector) + cache (Redis).
#
#   cd 03-produccion/examples/deploy
#   cp .env.example .env        # y completá OPENAI_API_KEY
#   docker compose up --build
#
# Las credenciales salen de .env (gitignored), NUNCA de este archivo: el compose
# commiteado no contiene secretos (dogfooding de §7).

services:
  app:
    build:
      context: ../../..                                   # raíz del repo
      dockerfile: 03-produccion/examples/deploy/Dockerfile
    env_file: .env
    environment:
      HOST: 0.0.0.0
      PORT: "8000"
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy                        # espera a que Postgres acepte
      cache:
        condition: service_started

  db:
    image: pgvector/pgvector:pg16                          # Postgres con la extensión vector
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./initdb:/docker-entrypoint-initdb.d:ro           # corre 0001_init.sql al primer arranque
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 3s
      timeout: 3s
      retries: 10

  cache:
    image: redis:7-alpine
    ports:
      - "6379:6379"

volumes:
  pgdata:
